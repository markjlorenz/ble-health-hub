[platformio]
; PlatformIO project for the ESP32 display + BLE hub.
; First milestone: verify the 76x284 TFT is working.

[common]
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  tzapu/WiFiManager
  ricmoo/QRCode

build_flags =
  -D USER_SETUP_LOADED=1
  -include include/User_Setup.h


; ESP32-S3 reference board (N16R8) default.
; PlatformIO's closest built-in board definition is typically `esp32-s3-devkitc-1`,
; then we override flash/PSRAM settings for N16R8 modules (16MB flash + 8MB PSRAM).
[env:esp32-s3-n16r8]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200

extra_scripts =
  pre:scripts/gen_flame_lottie_header.py

; N16R8 memory config
board_build.flash_size = 16MB
; ESP32-S3 + PSRAM modules are commonly OPI. This Arduino setting selects flash+psram mode.
; If your module is QSPI PSRAM instead, change to `qio_qspi`.
board_build.arduino.memory_type = qio_opi

lib_deps = ${common.lib_deps}

; Optional: enable USB CDC serial on many ESP32-S3 boards.
; If you prefer UART pins, you can remove these.
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  ${common.build_flags}

; Fallback environment for older ESP32 boards.
[env:esp32dev]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200

extra_scripts =
  pre:scripts/gen_flame_lottie_header.py

lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}

; Notes:
; - Update pins/driver in include/User_Setup.h to match your wiring.
; - If you have a different ESP32 board, change `board = ...` accordingly.
